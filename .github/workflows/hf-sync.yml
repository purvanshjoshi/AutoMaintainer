name: Sync to Hugging Face Hub

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git user for automated commit
          git config --global user.name "GitHub Actions Automator"
          git config --global user.email "actions@github.com"

          # Squash history into an orphan branch to bypass HF's LFS history checks
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Automated sync from GitHub Actions"

          # Force push to Purvansh's Hugging Face Space
          git push --force https://purvansh01:$HF_TOKEN@huggingface.co/spaces/purvansh01/AutoMaintainer hf-deploy:main
